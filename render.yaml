# Render Blueprint — deploy backend API
# Dashboard: New > Blueprint > connect this repo
services:
  - type: web
    name: agricommerce-api
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: uploads
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
